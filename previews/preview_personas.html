<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview — Personas caminando / corriendo</title>
  <style>
    html, body { margin: 0; height: 100%; background: #14100c; overflow: hidden; font-family: system-ui, sans-serif; }
    #hud {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      color: #ffd9a0; background: rgba(0,0,0,.45); padding: 10px 14px;
      border-radius: 8px; font-size: 13px; line-height: 1.5; backdrop-filter: blur(4px);
    }
    #hud b { color: #fff; }
    #hud button {
      background:#2a2016; color:#ffd9a0; border:1px solid #6b4f2a; border-radius:6px;
      padding:4px 8px; margin-right:6px; cursor:pointer; font-size:12px;
    }
    #hud button.on { background:#7a5a2a; color:#fff; }
    #labels { position: fixed; inset: 0; pointer-events: none; z-index: 9; }
    .lbl { position:absolute; transform:translate(-50%,-100%); color:#fff; font-size:12px;
           background:rgba(0,0,0,.5); padding:2px 6px; border-radius:5px; white-space:nowrap; }
  </style>
</head>
<body>
  <div id="hud">
    <div><b>Preview de personas</b> — arrastra para orbitar, rueda para zoom</div>
    <div style="margin-top:6px">
      Velocidad:
      <button data-spd="0">Idle</button>
      <button data-spd="1" class="on">Caminar</button>
      <button data-spd="2">Correr</button>
      <button data-spd="3">Sprint</button>
    </div>
  </div>
  <div id="labels"></div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
    import { crear as crearPersona, animarMarcha } from '../src/elementos/personas/persona.js';

    // --- Renderer / escena / cámara ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x14100c);
    scene.fog = new THREE.Fog(0x14100c, 12, 40);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(4.2, 2.4, 6.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.0, 0);
    controls.enableDamping = true;

    // --- Luces (parecido a la mina: cálida cenital + fría de relleno) ---
    scene.add(new THREE.HemisphereLight(0x8899bb, 0x2a1f16, 0.5));
    const key = new THREE.DirectionalLight(0xfff0dd, 2.2);
    key.position.set(5, 9, 4);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.left = -8; key.shadow.camera.right = 8;
    key.shadow.camera.top = 8; key.shadow.camera.bottom = -8;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x88aaff, 0.5);
    fill.position.set(-4, 3, -3);
    scene.add(fill);

    // --- Piso ---
    const piso = new THREE.Mesh(
      new THREE.CircleGeometry(30, 48),
      new THREE.MeshStandardMaterial({ color: 0x3a332a, roughness: 1 })
    );
    piso.rotation.x = -Math.PI / 2;
    piso.receiveShadow = true;
    scene.add(piso);
    const grid = new THREE.GridHelper(30, 30, 0x5a4a30, 0x2e2820);
    grid.position.y = 0.002;
    scene.add(grid);

    // --- Personas: una por rol, cada una en su carril ---
    const labelsDiv = document.getElementById('labels');
    const roles = [
      { rol: 'operador',    x: -2.4, txt: 'Operador (casco amarillo)',   epp: { respirador: false } },
      { rol: 'supervisor',  x:  0.0, txt: 'Supervisor (casco blanco)',    epp: { respirador: false } },
      { rol: 'geomecanica', x:  2.4, txt: 'Geomecánica (casco verde)',    epp: { respirador: false } },
    ];
    const personas = roles.map((r, i) => {
      const g = crearPersona({ rol: r.rol, epp: r.epp });
      g.position.set(r.x, 0, 0);
      g.rotation.y = Math.PI;           // mirando a la cámara
      g.traverse(o => { if (o.isMesh) o.castShadow = true; });
      scene.add(g);
      const el = document.createElement('div');
      el.className = 'lbl';
      el.textContent = r.txt;
      labelsDiv.appendChild(el);
      return { g, el, phase: i * 1.3, baseX: r.x, dir: 1 };
    });

    // --- Control de velocidad (idle / caminar / correr / sprint) ---
    const MODOS = [
      { amp: 0.06, freq: 1.5, vel: 0.0 },   // idle
      { amp: 0.55, freq: 9.0, vel: 1.1 },   // caminar
      { amp: 0.75, freq: 13.0, vel: 2.6 },  // correr
      { amp: 0.9,  freq: 16.0, vel: 4.0 },  // sprint
    ];
    let modo = 1;
    document.querySelectorAll('#hud button').forEach(b => {
      b.onclick = () => {
        modo = +b.dataset.spd;
        document.querySelectorAll('#hud button').forEach(x => x.classList.remove('on'));
        b.classList.add('on');
      };
    });

    // --- Loop ---
    const v3 = new THREE.Vector3();
    const clock = new THREE.Clock();
    function animate() {
      const dt = Math.min(clock.getDelta(), 0.05);
      const m = MODOS[modo];

      for (const p of personas) {
        p.phase += dt * m.freq;
        animarMarcha(p.g, p.phase, m.amp);

        // Desplazamiento real por el carril (ida y vuelta) para VER el avance del paso
        if (m.vel > 0) {
          p.g.position.x += p.dir * m.vel * dt;
          if (p.g.position.x > p.baseX + 3) p.dir = -1;
          if (p.g.position.x < p.baseX - 3) p.dir = 1;
          p.g.rotation.y = p.dir > 0 ? Math.PI / 2 : -Math.PI / 2;
        } else {
          p.g.rotation.y = Math.PI;
        }

        // Etiqueta HTML siguiendo la cabeza
        v3.set(p.g.position.x, 2.05, p.g.position.z).project(camera);
        p.el.style.left = (v3.x * 0.5 + 0.5) * innerWidth + 'px';
        p.el.style.top = (-v3.y * 0.5 + 0.5) * innerHeight + 'px';
        p.el.style.display = v3.z < 1 ? 'block' : 'none';
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
